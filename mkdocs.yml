# Hooks — runs local Python before/after page processing.
# `plugins/social_override.py` injects og:image and twitter:image on pages
# that declare `image:` in their frontmatter (e.g. docs/index.md).
# This is the Cairo-free path to social-media previews.
hooks:
  - plugins/social_override.py

# Site configuration

theme:
  name: material
  logo: img/mascot/welcome.png
  favicon: img/favicon.ico
  palette:
    primary: '#642580'
    accent: '#41BAC1'
  features:
    - content.code.copy
  custom_dir: 'theme'
  include_sidebar: true
markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true
plugins:
    - search
    - social
extra_css:
  - css/extra.css
  - css/mascot.css
  - css/docker-lab.css
  - https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css
  - https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css
  - css/codemirror-lab.css
extra_javascript:
  - js/extra.js
  - js/docker-lab.js
# Google Analytics Site ID: G-EP38Z3PVD5
extra:
  analytics:
    provider: google
    property: G-EP38Z3PVD5

